name: Deploy to Firebase

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Instalar dependencias de Functions
        run: cd functions && npm install

      - name: Deploy a Firebase (Hosting + Functions)
        run: firebase deploy --only hosting,functions --token "$FIREBASE_TOKEN" --project cotizadoratlas --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
